{% extends "base.html" %}

{% block title %}Edit Subject | StudyTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card soft-shadow border-0">
            <div class="card-body p-4">
                <h1 class="h4 section-title mb-1">Edit Subject</h1>
                <p class="text-muted mb-3">Update the subject name</p>

                {% if messages %}
                    <div class="mb-3">
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} mb-2" role="alert">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label" for="subject-name">Subject Name</label>
                        <input
                            type="text"
                            class="form-control"
                            id="subject-name"
                            name="name"
                            value="{{ subject.name }}"
                            required
                            placeholder="Enter subject name"
                        >
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{% url 'data_management' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
