{% extends "base.html" %}

{% block title %}Edit Goal | StudyTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card soft-shadow border-0">
            <div class="card-body p-4">
                <h1 class="h4 section-title mb-1">Edit Goal</h1>
                <p class="text-muted mb-3">Update your target grade for this subject</p>

                {% if messages %}
                    <div class="mb-3">
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} mb-2" role="alert">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <input type="text" class="form-control" value="{{ goal.subject.name }}" readonly>
                    </div>

                    <div class="mb-3 form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="active" name="active" {% if goal.active %}checked{% endif %}>
                        <label class="form-check-label" for="active">Active</label>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="target_grade">Target Grade</label>
                        <input type="number" step="0.01" min="0" max="100" name="target_grade" id="target_grade" class="form-control" value="{{ goal.target_grade }}" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save Goal</button>
                        <a href="{% url 'edit_subject' goal.subject.pk %}" class="btn btn-outline-secondary">Back</a>
                        <a href="{% url 'delete_goal' goal.pk %}" class="btn btn-outline-danger">Delete</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
