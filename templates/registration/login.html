{% extends 'base.html' %}
{% block title %}Login | StudyTrack{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card soft-shadow border-0">
            <div class="card-body p-4">
                <h1 class="h3 section-title mb-2">Welcome back</h1>
                <p class="text-muted">Sign in to monitor your academic progress.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.non_field_errors }}
                    <div class="mb-3">
                        <label class="form-label" for="id_username">Username</label>
                        <input type="text" name="username" autofocus required class="form-control" id="id_username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="id_password">Password</label>
                        <input type="password" name="password" required class="form-control" id="id_password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="mt-3 mb-0 text-center">
                    Need an account? <a href="{% url 'register' %}">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
