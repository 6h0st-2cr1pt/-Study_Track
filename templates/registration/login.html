{% extends 'base.html' %}
{% block title %}Login | StudyTrack{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center w-100 h-100" style="min-height: calc(100vh - 4rem);">
    <div style="width:100%; max-width:440px;">
        <div class="card shadow-sm border-0" style="border-radius: 16px;">
            <div class="card-body p-4 p-sm-5">
                <div class="text-center mb-4">
                    <img src="/static/icons/work-in-progress.png" alt="StudyTrack Logo" style="width: 48px; height: 48px; border-radius: 12px; background: #e0e7ff; padding: 8px; margin-bottom: 16px;">
                    <h1 class="h4 fw-bold mb-1" style="color: var(--text-color);">Welcome back</h1>
                    <p class="text-muted small">Sign in to your account</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    {{ form.non_field_errors }}
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold" for="id_username" style="font-size: 0.75rem; letter-spacing: 0.05em;">USERNAME</label>
                        <input type="text" name="username" autofocus required class="form-control form-control-lg border-0 bg-light" id="id_username" placeholder="Enter your username" style="border-radius: 10px; font-size: 0.95rem;">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold" for="id_password" style="font-size: 0.75rem; letter-spacing: 0.05em;">PASSWORD</label>
                        <input type="password" name="password" required class="form-control form-control-lg border-0 bg-light" id="id_password" placeholder="Enter your password" style="border-radius: 10px; font-size: 0.95rem;">
                    </div>
                    <div class="d-grid mt-4 pt-2">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm" style="border-radius: 10px; font-weight: 500; font-size: 1rem; padding: 12px;">Log in</button>
                    </div>
                </form>
                
                <div class="text-center mt-4 pt-4 border-top">
                    <p class="mb-0 text-muted small">Don't have an account? <a href="{% url 'register' %}" class="fw-bold text-primary text-decoration-none">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
/* Dark mode adjustments for Login */
@media (prefers-color-scheme: dark) {
    .bg-light { background-color: #1a1c23 !important; }
    .card { background-color: #0f1115 !important; border: 1px solid #272a33 !important; }
}
</style>
{% endblock %}
